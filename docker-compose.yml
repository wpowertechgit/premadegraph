services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/pathfinder-rust/target
      - ./playersrefined.db:/app/data/databases/default/playersrefined.db
    environment:
      - NODE_ENV=development
      - GRAPH_DB_PATH=/app/data/databases/default/playersrefined.db
      - PATHFINDER_RUST_BIN=/app/pathfinder-rust/target/debug/pathfinder_rust

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
