services:
  neurosim:
    build: ./backend/genetic-neurosim/backend
    ports:
      - "8000:8000"
    environment:
      - PREMADEGRAPH_URL=http://backend:3001
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/pathfinder-rust/target
      - ./playersrefined.db:/app/data/databases/default/playersrefined.db
    environment:
      - NODE_ENV=development
      - GRAPH_DB_PATH=/app/data/databases/default/playersrefined.db
      - PATHFINDER_RUST_BIN=/app/pathfinder-rust/target/debug/pathfinder_rust
      - DB_EXPLORER_ORIGIN=http://db-explorer:5088
      - NEUROSIM_HOST=neurosim
    depends_on:
      - db-explorer

  db-explorer:
    build:
      context: .
      dockerfile: docs/databaseproject/simple-interface/Dockerfile
    ports:
      - "5088:5088"
    volumes:
      - ./backend:/workspace/backend
      - ./playersrefined.db:/workspace/playersrefined.db
      - ./docs/databaseproject/simple-interface/Data:/workspace/docs/databaseproject/simple-interface/Data
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5088
      - DB_EXPLORER_PATH_BASE=/db-explorer

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
